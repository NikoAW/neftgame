<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neft Game - Global Admin System</title>
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --bg: #0a0a0c; --card-bg: #16161a; --text: #ffffff; --error: #ff4d4d; --success: #00ff88; --chat-bot: #25252b; --chat-user: #7000ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 95%; max-width: 420px; background: var(--card-bg); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #333; border-radius: 12px; color: white; outline: none; }
        .main-btn { width: 100%; padding: 15px; border-radius: 12px; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; border:none; margin-top: 10px; }
        
        /* Admin Panel Stili */
        #admin-panel { display: none; background: #1a1a2e; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); margin-top: 20px; text-align: left; }
        .admin-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; color: #444; cursor: pointer; }

        /* Chat Stili */
        #chat-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999; flex-direction: column; }
        .chat-header { padding: 15px 20px; background: var(--card-bg); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 0.95rem; }
        .bot-msg { background: var(--chat-bot); align-self: flex-start; white-space: pre-wrap; }
        .user-msg { background: var(--chat-user); align-self: flex-end; }
        
        .step { display: none; } .step.active { display: block; }
        .progress-bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); transition: 0.3s; }
    </style>
</head>
<body>

    <div class="container">
        <div class="admin-badge" onclick="alert('Admin girişi üçün kodu bura yazın')">Admin v2.0</div>

        <div id="step1" class="step active">
            <button onclick="openChat()" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:5px 15px; border-radius:20px; cursor:pointer; margin-bottom:15px;">💬 DƏSTƏK</button>
            <h2>NEFT GAME SHOP</h2>
            <input type="text" id="access-code" placeholder="Aktivasiya Kodu">
            <p id="error-msg" style="color:var(--error); font-size:0.8rem; height:20px;"></p>
            <button class="main-btn" onclick="verifyCode()">DAXİL OL</button>

            <div id="admin-panel">
                <h3 style="color:var(--primary); font-size:0.9rem; margin-bottom:10px;">PANEL: KOD ƏLAVƏ ET</h3>
                <input type="text" id="new-code" placeholder="Məs: NEFT-777" style="padding:8px">
                <button onclick="addNewCode()" style="width:100%; background:var(--success); border:none; padding:8px; border-radius:8px; cursor:pointer; font-weight:bold;">BAZAYA YAZ</button>
                <p id="admin-status" style="font-size:10px; margin-top:5px;"></p>
            </div>
        </div>

        <div id="step-loader" class="step">
            <h2 id="loader-text">YOXLANILIR</h2>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>

        <div id="step2" class="step">
            <h2>PAKET SEÇİN</h2>
            <select id="packet-select">
                <option>660 UC (5 AZN)</option>
                <option>1920 UC (13 AZN)</option>
                <option>3120 UC (21 AZN)</option>
                <option>8100 UC (35 AZN)</option>
                <option>Royale Pass Plus (6 AZN)</option>
            </select>
            <input type="number" id="player-id" placeholder="Oyunçu ID">
            <button class="main-btn" onclick="processOrder()">TƏSDİQLƏ</button>
        </div>

        <div id="step3" class="step">
            <h2 style="color:var(--success);">UĞURLUDUR</h2>
            <p style="font-size:0.8rem; margin:10px 0;">Sifarişiniz emala alındı. 15 dəqiqə ərzində hesaba yüklənəcək.</p>
            <button class="main-btn" onclick="location.reload()">GERİ QAYIT</button>
        </div>
    </div>

    <div id="chat-overlay">
        <div class="chat-header">
            <span style="font-weight:bold; color:var(--primary)">NEFT GAME OPERATOR</span>
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="message bot-msg">Salam! Mən Neft Game köməkçisiyəm. Sizə necə yardım edə bilərəm?</div>
        </div>
        <div style="padding:15px; display:flex; gap:10px; background:var(--card-bg)">
            <input type="text" id="chat-input" placeholder="Mesajınızı yazın..." style="margin:0">
            <button onclick="sendMessage()" style="background:var(--primary); border:none; padding:10px 20px; border-radius:12px; font-weight:bold">></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOq7UqFo6Y9ldVXRthRP6U02TayFkv53I",
            authDomain: "neftgame-e4de3.firebaseapp.com",
            projectId: "neftgame-e4de3",
            storageBucket: "neftgame-e4de3.firebasestorage.app",
            messagingSenderId: "27529172910",
            appId: "1:27529172910:web:1a2a752e79295d47c39a3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // KODU YOXLAMAQ
        window.verifyCode = async function() {
            const code = document.getElementById('access-code').value.trim();
            const msg = document.getElementById('error-msg');

            if(code === "Admin2026") {
                document.getElementById('admin-panel').style.display = 'block';
                msg.innerText = "Admin Paneli Açıldı";
                msg.style.color = "var(--success)";
                return;
            }

            if(!code) return;
            msg.innerText = "Baza yoxlanılır...";

            try {
                const docRef = doc(db, "codes", code.toUpperCase());
                const snap = await getDoc(docRef);

                if(snap.exists()) {
                    if(snap.data().used === true) {
                        msg.innerText = "Bu kod artıq işlənib!";
                        msg.style.color = "var(--error)";
                    } else {
                        await updateDoc(docRef, { used: true });
                        runLoader(() => showStep('step2'));
                    }
                } else {
                    msg.innerText = "Kod yanlışdır!";
                    msg.style.color = "var(--error)";
                }
            } catch(e) { msg.innerText = "Bağlantı xətası!"; }
        }

        // YENİ KOD ƏLAVƏ ETMƏK (ADMİN ÜÇÜN)
        window.addNewCode = async function() {
            const newCode = document.getElementById('new-code').value.trim().toUpperCase();
            const status = document.getElementById('admin-status');
            if(!newCode) return;

            try {
                await setDoc(doc(db, "codes", newCode), { used: false, date: new Date().toISOString() });
                status.innerText = "UĞURLU: " + newCode + " bazaya əlavə edildi!";
                status.style.color = "var(--success)";
                document.getElementById('new-code').value = "";
            } catch(e) { status.innerText = "Xəta baş verdi!"; }
        }
    </script>

    <script>
        // SƏHİFƏLƏR ARASI KEÇİD
        function showStep(s) {
            document.querySelectorAll('.step').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
        }

        function runLoader(cb) {
            showStep('step-loader');
            let p = 0;
            let iv = setInterval(() => {
                p += 20;
                document.getElementById('progress-fill').style.width = p + "%";
                if(p >= 100) { clearInterval(iv); cb(); }
            }, 250);
        }

        function processOrder() {
            if(document.getElementById('player-id').value.length < 5) { alert("ID daxil edin!"); return; }
            runLoader(() => showStep('step3'));
        }

        // CHAT MƏNTİQİ
        const qa = [
            { k: ["salam", "necesen"], r: "Salam! Neft Game xidmətinizdədir. Necə kömək edim?" },
            { k: ["qiymet", "neceyedir", "uc"], r: "🔥 Qiymətlər:\n660 UC: 5 AZN\n1920 UC: 13 AZN\n8100 UC: 35 AZN" },
            { k: ["kart", "odenis", "ödəniş"], r: "💳 Kart: 4244 4848 4180 8581\nÖdənişdən sonra qəbzi Adminə göndərin." },
            { k: ["admin", "wp", "elaqe"], r: "📞 Admin WhatsApp: +994 77 124 49 44" }
        ];

        function sendMessage() {
            const inp = document.getElementById('chat-input');
            const txt = inp.value.trim().toLowerCase();
            if(!txt) return;
            addMsg(inp.value, 'user-msg');
            inp.value = "";
            
            setTimeout(() => {
                let res = "Anlamadım, zəhmət olmasa WhatsApp adminlə əlaqə saxlayın: +994 77 124 49 44";
                qa.forEach(i => { if(i.k.some(key => txt.includes(key))) res = i.r; });
                addMsg(res, 'bot-msg');
            }, 1000);
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); d.className = `message ${cl}`; d.innerText = t;
            const body = document.getElementById('chat-body');
            body.appendChild(d);
            body.scrollTop = body.scrollHeight;
        }

        function openChat() { document.getElementById('chat-overlay').style.display = 'flex'; }
        function closeChat() { document.getElementById('chat-overlay').style.display = 'none'; }
    </script>
</body>
</html>
