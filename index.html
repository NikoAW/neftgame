<!DOCTYPE html>
<html lang="az" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neft Game | Premium Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #08080a;
            --card-bg: #121216;
            --text: #ffffff;
            --error: #ff3333;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sistem Statusu - Sol Üst */
        .status-tag {
            position: fixed; top: 15px; left: 15px;
            padding: 6px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
            letter-spacing: 1px; border: 1px solid rgba(0,255,136,0.3);
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            z-index: 100;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* Əsas Panel */
        .panel {
            width: 90%; max-width: 400px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        h2 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem; color: var(--primary);
            margin-bottom: 25px; letter-spacing: 2px;
            text-align: center;
        }

        .step { display: none; width: 100%; }
        .step.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inputlar */
        input, select {
            width: 100%; padding: 14px 18px;
            background: #1a1a20; border: 1px solid #2a2a32;
            border-radius: 12px; color: white;
            font-size: 15px; margin-bottom: 15px;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: #202028; }

        /* Düymə */
        .btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none; border-radius: 12px;
            color: white; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 242, 255, 0.3); }

        /* Loading Ekranı */
        .loader-container { text-align: center; padding: 20px 0; }
        .bar-bg { width: 100%; height: 6px; background: #1a1a20; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.4s; }
        .loader-text { font-size: 13px; color: var(--primary); font-family: 'Orbitron', sans-serif; }

        /* Admin Panel */
        #admin-panel { 
            margin-top: 20px; padding-top: 20px; border-top: 1px solid #2a2a32;
            display: none; text-align: left;
        }
        .admin-title { font-size: 12px; color: #666; margin-bottom: 10px; }

        /* Dəstək Düyməsi */
        .support-link {
            text-align: center; margin-bottom: 20px;
        }
        .support-link button {
            background: transparent; border: 1px solid #2a2a32;
            color: #888; padding: 8px 16px; border-radius: 20px;
            font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .support-link button:hover { border-color: var(--primary); color: var(--primary); }

    </style>
</head>
<body onload="checkSystem()">

    <div class="status-tag" id="main-status">
        <div class="status-dot"></div>
        <span id="status-text">SİSTEM AKTİVDİR</span>
    </div>

    <div class="panel">
        
        <div id="step1" class="step active">
            <div class="support-link"><button onclick="alert('Dəstək tezliklə aktiv olacaq!')">DESTEK MASASI</button></div>
            <h2>ACCESS PANEL</h2>
            <input type="text" id="access-code" placeholder="Aktivasiya kodu">
            <p id="error-msg" style="color:var(--error); font-size:12px; margin-bottom:10px; text-align:center;"></p>
            <button class="btn" onclick="verifyCode()">Daxil ol</button>

            <div id="admin-panel">
                <p class="admin-title">ADMİN İDARƏETMƏ</p>
                <button class="btn" id="toggle-btn" onclick="toggleSystem()" style="background:#222; font-size:12px;">Sistemi Bağla</button>
                <input type="text" id="new-code" placeholder="Yeni kod yarat" style="margin-top:10px;">
                <button class="btn" onclick="addCode()" style="font-size:12px;">Kodu Əlavə Et</button>
            </div>
        </div>

        <div id="step-loader" class="step">
            <div class="loader-container">
                <p class="loader-text" id="loader-msg">CRYPTING...</p>
                <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
                <p style="font-size:11px; color:#555;">Server protokolları yoxlanılır</p>
            </div>
        </div>

        <div id="step2" class="step">
            <h2>MƏLUMATLAR</h2>
            <select id="uc-select">
                <option value="660">660 UC - 5 AZN</option>
                <option value="1920">1920 UC - 13 AZN</option>
                <option value="8100">8100 UC - 35 AZN</option>
            </select>
            <input type="number" id="pubg-id" placeholder="PUBG ID">
            <button class="btn" onclick="submitOrder()">Təsdiqlə</button>
        </div>

        <div id="step3" class="step" style="text-align:center;">
            <div style="font-size:50px; color:var(--success); margin-bottom:15px;">✓</div>
            <h2>UĞURLUDUR</h2>
            <p style="font-size:14px; color:#888; margin-bottom:20px;">Sifarişiniz emal edildi!</p>
            <button class="btn" onclick="location.reload()" style="background:#222;">Geri qayıt</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Sənin Firebase məlumatların bura gələcək (Köhnə koddakı kimi saxla)
        const firebaseConfig = {
            apiKey: "AIzaSyCOq7UqFo6Y9ldVXRthRP6U02TayFkv53I",
            authDomain: "neftgame-e4de3.firebaseapp.com",
            projectId: "neftgame-e4de3",
            storageBucket: "neftgame-e4de3.firebasestorage.app",
            messagingSenderId: "27529172910",
            appId: "1:27529172910:web:1a2a752e79295d47c39a3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let systemActive = true;

        // Sistemi Yoxla
        window.checkSystem = function() {
            onSnapshot(doc(db, "settings", "global"), (snap) => {
                if(snap.exists()){
                    systemActive = snap.data().active;
                    const st = document.getElementById('main-status');
                    const txt = document.getElementById('status-text');
                    if(!systemActive) {
                        st.style.borderColor = "rgba(255,51,51,0.3)";
                        st.querySelector('.status-dot').style.background = "var(--error)";
                        txt.innerText = "SİSTEM BAĞLIDIR";
                        txt.style.color = "var(--error)";
                    } else {
                        st.style.borderColor = "rgba(0,255,136,0.3)";
                        st.querySelector('.status-dot').style.background = "var(--success)";
                        txt.innerText = "SİSTEM AKTİVDİR";
                        txt.style.color = "var(--success)";
                    }
                }
            });
        }

        // Giriş
        window.verifyCode = async function() {
            const code = document.getElementById('access-code').value.toUpperCase();
            if(code === "ADMIN2026") {
                document.getElementById('admin-panel').style.display = "block";
                return;
            }

            if(!systemActive) {
                alert("Sistem hazırda bağlıdır!");
                return;
            }

            const docRef = doc(db, "codes", code);
            const snap = await getDoc(docRef);

            if(snap.exists() && !snap.data().used) {
                localStorage.setItem("current_code", code);
                startLoading(() => showStep('step2'));
            } else {
                document.getElementById('error-msg').innerText = "Kod yanlışdır və ya işlənib!";
            }
        }

        // Addım dəyişmə
        function showStep(id) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Loading Animasiyası
        function startLoading(callback) {
            showStep('step-loader');
            let p = 0;
            const bar = document.getElementById('bar-fill');
            const interval = setInterval(() => {
                p += 2;
                bar.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(interval);
                    setTimeout(callback, 500);
                }
            }, 80); // 4-5 saniyə çəkir
        }

        // Sifariş
        window.submitOrder = async function() {
            const id = document.getElementById('pubg-id').value;
            const code = localStorage.getItem("current_code");
            if(id.length < 5) return alert("ID daxil edin!");
            
            await updateDoc(doc(db, "codes", code), { used: true, player: id });
            startLoading(() => showStep('step3'));
        }

        // Admin Funksiyaları
        window.toggleSystem = async function() {
            await setDoc(doc(db, "settings", "global"), { active: !systemActive });
        }
        
        window.addCode = async function() {
            const code = document.getElementById('new-code').value.toUpperCase();
            if(!code) return;
            await setDoc(doc(db, "codes", code), { used: false });
            alert("Kod əlavə edildi!");
        }

    </script>
</body>
</html>
