<!DOCTYPE html>
<html lang="az" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neft Game - Professional Admin v4.8</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0a0c;
            --card-bg: #16161a;
            --text: #ffffff;
            --error: #ff4d4d;
            --success: #00ff88;
            --chat-bot: #25252b;
            --chat-user: #7000ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .container { width: 95%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        h2 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-size: 1.4rem; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #333; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .main-btn { width: 100%; padding: 16px; border-radius: 12px; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; margin-top: 10px; box-shadow: 0 4px 15px rgba(112, 0, 255, 0.3); }
        
        /* ADMIN PANEL YENİLİKLƏR */
        #admin-panel { display: none; margin-top: 20px; padding: 15px; background: #000; border-radius: 15px; border: 2px solid var(--primary); text-align: left; }
        .admin-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #111; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .stat-box span { display: block; font-size: 0.7rem; color: #888; }
        .stat-box b { font-size: 1.1rem; color: var(--primary); }

        .code-card { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 11px; border-left: 4px solid var(--primary); position: relative; }
        .code-card.used { border-left-color: var(--error); opacity: 0.8; }
        .code-card.expired { border-left-color: #555; }
        .delete-btn { position: absolute; right: 10px; top: 10px; color: var(--error); cursor: pointer; font-weight: bold; }

        /* Diğer elementler */
        #chat-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999; flex-direction: column; }
        .chat-header { padding: 15px 20px; background: var(--card-bg); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; }
        .bot-msg { background: var(--chat-bot); align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
        .user-msg { background: var(--chat-user); align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .step { display: none; } .step.active { display: block; }
        .progress-bar { height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin: 25px 0; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); transition: 0.4s; }
        #receiptCanvas { width: 100%; border-radius: 10px; margin-top: 15px; border: 1px solid #333; background: #000; }
    </style>
</head>
<body>

    <div class="container">
        <div id="step1" class="step active">
            <div onclick="openChat()" style="cursor:pointer; display: inline-block; margin-bottom: 20px;">
                <img width="48" height="48" src="https://img.icons8.com/fluency/48/chatbot--v1.png" alt="chatbot--v1"/>
                <p style="color:var(--primary); font-size: 0.7rem; font-weight: bold;">BOT DƏSTƏK</p>
            </div>
            <h2>SİSTEMƏ GİRİŞ</h2>
            <input type="text" id="access-code" placeholder="Aktivasiya Kodunu Daxil Edin">
            <p id="error-msg" style="color:var(--error); font-size:0.8rem; min-height:20px; margin-top:5px;"></p>
            <button class="main-btn" onclick="verifyCode()">DAXİL OL</button>

            <div id="admin-panel">
                <div style="display: flex; justify-content: space-between; color: var(--primary); font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px;">
                    <span>📊 STRATEJİ PANEL</span>
                    <span onclick="location.reload()" style="cursor:pointer;">[X]</span>
                </div>

                <div class="admin-stats">
                    <div class="stat-box"><span>ÜMUMİ QAZANC</span><b id="total-revenue">0 AZN</b></div>
                    <div class="stat-box"><span>AKTİV KODLAR</span><b id="active-count">0</b></div>
                </div>

                <input type="text" id="new-code-input" placeholder="KOD ADI (Məs: VIP-100)">
                <select id="expiry-hours">
                    <option value="0">Müddətsiz (Həmişəlik)</option>
                    <option value="1">1 Saatlıq</option>
                    <option value="24">24 Saatlıq</option>
                    <option value="168">7 Günlük</option>
                </select>
                <button onclick="addNewCode()" style="width:100%; background:var(--success); color:black; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">KODU AKTİVLƏŞDİR</button>
                
                <h4 style="margin: 15px 0 10px; font-size: 0.8rem; color: #888; display: flex; justify-content: space-between;">
                    MÖVCUD BAZA <span onclick="clearUsed()" style="color:var(--error); cursor:pointer;">[İşlənmişləri təmizlə]</span>
                </h4>
                <div id="codes-list" style="max-height: 200px; overflow-y: auto;"></div>
            </div>
        </div>

        <div id="step-loader" class="step">
            <h2 id="loader-title">YOXLANILIR...</h2>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>

        <div id="step2" class="step">
            <h2>SİFARİŞ MƏLUMATI</h2>
            <select id="packet-select">
                <option value="660 UC (5 AZN)">660 UC • 5 AZN</option>
                <option value="1920 UC (13 AZN)">1920 UC • 13 AZN</option>
                <option value="8100 UC (35 AZN)">8100 UC • 35 AZN</option>
            </select>
            <input type="number" id="player-id" placeholder="PUBG Mobile ID">
            <button class="main-btn" onclick="processOrder()">TƏSDİQLƏ</button>
        </div>

        <div id="step3" class="step">
            <h2 style="color:var(--success);">UĞURLUDUR!</h2>
            <canvas id="receiptCanvas" width="400" height="500"></canvas>
            <button class="main-btn" onclick="downloadReceipt()">QƏBZİ YÜKLƏ (.PNG)</button>
            <button class="main-btn" onclick="location.reload()" style="background:#333; margin-top:10px;">YENİ SİFARİŞ</button>
        </div>
    </div>

    <div id="chat-overlay">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://img.icons8.com/fluency/48/chatbot--v1.png" width="35">
                <span style="font-weight:bold; color:var(--primary);">NEFT BOT</span>
            </div>
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="message bot-msg">Salam! Mən Neft Game botuyam. Sualınız var?</div>
        </div>
        <div style="padding:20px; display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="Bura yazın..." style="margin:0">
            <button onclick="sendMessage()" style="background:var(--primary); border:none; padding:0 15px; border-radius:10px;">></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOq7UqFo6Y9ldVXRthRP6U02TayFkv53I",
            authDomain: "neftgame-e4de3.firebaseapp.com",
            projectId: "neftgame-e4de3",
            storageBucket: "neftgame-e4de3.firebasestorage.app",
            messagingSenderId: "27529172910",
            appId: "1:27529172910:web:1a2a752e79295d47c39a3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let activeCode = "";

        // IP VƏ CİHAZ MƏLUMATINI ALMAQ
        async function getVisitorInfo() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return { ip: data.ip, device: navigator.userAgent.split(') ')[0].split('(')[1] };
            } catch { return { ip: "Gizli", device: "Naməlum" }; }
        }

        window.verifyCode = async function() {
            const code = document.getElementById('access-code').value.trim().toUpperCase();
            if(code === "ADMIN2026") { document.getElementById('admin-panel').style.display = 'block'; loadCodes(); return; }
            if(!code) return;
            
            const err = document.getElementById('error-msg');
            err.innerText = "Yoxlanılır...";
            
            try {
                const docRef = doc(db, "codes", code);
                const snap = await getDoc(docRef);
                if(snap.exists()) {
                    const data = snap.data();
                    const now = new Date().getTime();
                    if(data.used) err.innerText = "Bu kod artıq işlənib!";
                    else if(data.expiry && now > data.expiry) err.innerText = "Kodun vaxtı bitib!";
                    else { activeCode = code; runLoader(() => showStep('step2')); }
                } else { err.innerText = "Kod tapılmadı!"; }
            } catch(e) { err.innerText = "Sistem xətası!"; }
        }

        async function loadCodes() {
            const list = document.getElementById('codes-list');
            list.innerHTML = "<small>Baza yüklənir...</small>";
            const snap = await getDocs(collection(db, "codes"));
            list.innerHTML = "";
            let revenue = 0; let activeCount = 0;
            const now = new Date().getTime();

            snap.forEach(d => {
                const data = d.data();
                const isExpired = data.expiry && now > data.expiry && !data.used;
                if(!data.used && !isExpired) activeCount++;
                if(data.used) {
                    const price = parseInt(data.packet.match(/\d+/g)[1]); // Qiyməti çıxarır
                    revenue += price;
                }

                const div = document.createElement('div');
                div.className = `code-card ${data.used ? 'used' : ''} ${isExpired ? 'expired' : ''}`;
                div.innerHTML = `
                    <span class="delete-btn" onclick="deleteCode('${d.id}')">SİL</span>
                    <strong>${d.id}</strong> <small>(${isExpired ? 'VAXTI BİTİB' : (data.used ? 'İŞLƏNİB' : 'AKTİV')})</small><br>
                    <span style="font-size:9px; color:#888;">${data.used ? 'ID: '+data.usedBy+' | IP: '+(data.ip || '---') : 'Gözləmədə'}</span>
                `;
                list.appendChild(div);
            });
            document.getElementById('total-revenue').innerText = revenue + " AZN";
            document.getElementById('active-count').innerText = activeCount;
        }

        window.addNewCode = async function() {
            const val = document.getElementById('new-code-input').value.trim().toUpperCase();
            const hrs = parseInt(document.getElementById('expiry-hours').value);
            if(!val) return;
            const exp = hrs > 0 ? (new Date().getTime() + (hrs * 60 * 60 * 1000)) : null;
            await setDoc(doc(db, "codes", val), { used: false, usedBy: null, expiry: exp, createdAt: new Date().getTime() });
            document.getElementById('new-code-input').value = ""; loadCodes();
        }

        window.deleteCode = async function(id) { if(confirm(id + " silinsin?")) { await deleteDoc(doc(db, "codes", id)); loadCodes(); } }

        window.clearUsed = async function() {
            if(confirm("Bütün işlənmiş kodlar təmizlənsin?")) {
                const snap = await getDocs(collection(db, "codes"));
                snap.forEach(async (d) => { if(d.data().used) await deleteDoc(doc(db, "codes", d.id)); });
                setTimeout(loadCodes, 1000);
            }
        }

        window.processOrder = async function() {
            const pid = document.getElementById('player-id').value;
            const pack = document.getElementById('packet-select').value;
            if(pid.length < 5) return alert("ID Yanlışdır!");
            
            const visitor = await getVisitorInfo();
            await updateDoc(doc(db, "codes", activeCode), { 
                used: true, usedBy: pid, packet: pack, 
                usedAt: new Date().toLocaleString(),
                ip: visitor.ip, device: visitor.device 
            });
            
            runLoader(() => { generateReceipt(pid, pack); showStep('step3'); });
        }
    </script>

    <script>
        function showStep(s) { document.querySelectorAll('.step').forEach(x => x.classList.remove('active')); document.getElementById(s).classList.add('active'); }
        function runLoader(cb) { showStep('step-loader'); let p = 0; let iv = setInterval(() => { p += 25; document.getElementById('progress-fill').style.width = p + "%"; if(p >= 100) { clearInterval(iv); cb(); } }, 300); }
        function openChat() { document.getElementById('chat-overlay').style.display='flex'; }
        function closeChat() { document.getElementById('chat-overlay').style.display='none'; }

        function generateReceipt(id, pack) {
            const canvas = document.getElementById('receiptCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#0f0f12"; ctx.fillRect(0,0,400,500);
            ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 10; ctx.strokeRect(0,0,400,500);
            ctx.fillStyle = "#00f2ff"; ctx.font = "bold 26px Arial"; ctx.fillText("NEFT GAME SHOP", 85, 60);
            ctx.fillStyle = "#fff"; ctx.font = "16px Courier New";
            ctx.fillText("--------------------------", 40, 120);
            ctx.fillText("OYUNÇU ID: " + id, 40, 180);
            ctx.fillText("MƏHSUL: " + pack, 40, 220);
            ctx.fillText("STATUS: UĞURLU", 40, 260);
            ctx.fillText("--------------------------", 40, 320);
            ctx.fillStyle = "#00ff88"; ctx.font = "bold 20px Arial";
            ctx.fillText("SİFARİŞ TƏSDİQLƏNDİ", 95, 420);
        }

        function downloadReceipt() { const link = document.createElement('a'); link.download = 'qebz.png'; link.href = document.getElementById('receiptCanvas').toDataURL(); link.click(); }
        
        function sendMessage() {
            const inp = document.getElementById('chat-input');
            if(!inp.value) return;
            const b = document.getElementById('chat-body');
            b.innerHTML += `<div class="message user-msg">${inp.value}</div>`;
            setTimeout(() => { b.innerHTML += `<div class="message bot-msg">Dəstək üçün WhatsApp: +994 77 124 49 44</div>`; b.scrollTop = b.scrollHeight; }, 800);
            inp.value = "";
        }
    </script>
</body>
    </html>
