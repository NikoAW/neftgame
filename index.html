<!DOCTYPE html>
<html lang="az" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neft Game - Cyber System 2026</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050507;
            --card-bg: rgba(22, 22, 26, 0.95);
            --text: #ffffff;
            --error: #ff2e2e;
            --success: #00ff88;
            --warning: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', 'Segoe UI', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
            perspective: 1000px;
        }

        /* Arxa fon animasiyası */
        .bg-glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 500px; background: radial-gradient(circle, rgba(112,0,255,0.15) 0%, transparent 70%);
            z-index: -1; animation: pulse 8s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } }

        /* Sistem Status Box */
        .status-box {
            position: fixed; top: 20px; left: 20px; padding: 8px 15px;
            border-radius: 8px; font-size: 11px; font-weight: bold;
            text-transform: uppercase; border: 1px solid currentColor;
            box-shadow: 0 0 10px currentColor; z-index: 1001;
            display: flex; align-items: center; gap: 8px;
            transition: 0.5s;
        }
        .online { color: var(--success); }
        .offline { color: var(--error); }

        /* Ana Container */
        .container { 
            width: 95%; max-width: 450px; background: var(--card-bg); 
            padding: 30px; border-radius: 24px; text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,242,255,0.05);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h2 { color: var(--primary); text-shadow: 0 0 10px var(--primary); margin-bottom: 25px; font-size: 1.5rem; letter-spacing: 3px; }

        input, select { 
            width: 100%; padding: 15px; margin: 12px 0; background: rgba(0,0,0,0.5); 
            border: 1px solid #333; border-radius: 14px; color: white; outline: none;
            transition: 0.3s; font-size: 0.9rem;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,242,255,0.3); }

        .main-btn { 
            width: 100%; padding: 18px; border-radius: 14px; 
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white; font-weight: bold; cursor: pointer; border: none;
            text-transform: uppercase; margin-top: 15px;
            transition: 0.3s; box-shadow: 0 5px 20px rgba(112, 0, 255, 0.4);
        }
        .main-btn:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--primary); }
        .main-btn:active { transform: scale(0.98); }

        /* Admin UI */
        #admin-panel { display: none; margin-top: 25px; padding: 20px; background: #000; border-radius: 18px; border: 1px solid var(--warning); text-align: left; animation: slideUp 0.5s; }
        @keyframes slideUp { from { opacity: 0; height: 0; } to { opacity: 1; height: auto; } }

        /* Chat Overlay */
        #chat-overlay { 
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            flex-direction: column; animation: chatOpen 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes chatOpen { from { clip-path: circle(0% at 50% 50%); } to { clip-path: circle(100% at 50% 50%); } }

        .chat-header { padding: 20px; background: var(--card-bg); border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex-grow: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; background: radial-gradient(circle at top, #0a0a0f, #050507); }
        .message { padding: 14px 18px; border-radius: 20px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .bot-msg { background: #1e1e24; align-self: flex-start; border-bottom-left-radius: 5px; border-left: 3px solid var(--primary); }
        .user-msg { background: var(--secondary); align-self: flex-end; border-bottom-right-radius: 5px; }

        .typing { font-size: 0.8rem; color: var(--primary); padding: 10px 25px; display: none; font-style: italic; }

        .progress-bar { height: 12px; background: #111; border-radius: 6px; overflow: hidden; margin: 30px 0; border: 1px solid #222; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--secondary), var(--primary)); transition: 0.5s; }

        #receiptCanvas { width: 100%; border-radius: 15px; margin-top: 20px; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body onload="initSystem()">

    <div class="bg-glow"></div>

    <div id="status-indicator" class="status-box online">
        <span id="status-dot">●</span> <span id="status-text">SİSTEM AKTİVDİR</span>
    </div>

    <div class="container">
        <div id="step1" class="step active">
            <button onclick="handleChatToggle()" class="help-btn" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:10px 25px; border-radius:30px; cursor:pointer; margin-bottom:25px; font-weight:bold; transition: 0.3s;">💬 DESTEK MASASI</button>
            <h2>ACCESS PANEL</h2>
            <input type="text" id="access-code" placeholder="Aktivasiya Kodunu Yazın">
            <p id="error-msg" style="color:var(--error); font-size:0.8rem; min-height:20px; margin: 10px 0;"></p>
            <button class="main-btn" onclick="verifyCode()">SİSTEMƏ SIZ</button>

            <div id="admin-panel">
                <h3 style="color:var(--warning); margin-bottom:15px; font-size:0.9rem;">⚙️ MASTER CONTROL PANEL</h3>
                
                <div style="background:#111; padding:15px; border-radius:12px; margin-bottom:15px;">
                    <p style="font-size:12px; margin-bottom:10px;">GLOBAL SİSTEM STATUSU:</p>
                    <button id="toggle-system-btn" onclick="toggleGlobalSystem()" style="width:100%; padding:10px; border-radius:8px; border:none; cursor:pointer; font-weight:bold;"></button>
                </div>

                <input type="text" id="new-code-input" placeholder="Yeni Kod">
                <select id="expiry-select">
                    <option value="1">1 Saat</option>
                    <option value="24">24 Saat</option>
                    <option value="8760">Həmişəlik</option>
                </select>
                <button onclick="addNewCode()" style="width:100%; background:var(--success); border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; color:#000;">KODU BAZAYA YAZ</button>
                
                <div id="codes-list" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
            </div>
        </div>

        <div id="step-loader" class="step">
            <h2 id="loader-title">CRYPTING...</h2>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <p id="loader-status" style="color:var(--primary); font-size:0.8rem; letter-spacing:1px;">Server protokolları yoxlanılır...</p>
        </div>

        <div id="step2" class="step">
            <h2>MƏLUMATLARI DAXIL ET</h2>
            <select id="packet-select">
                <option value="660 UC (5 AZN)">660 UC • 5 AZN</option>
                <option value="1920 UC (13 AZN)">1920 UC • 13 AZN</option>
                <option value="8100 UC (35 AZN)">8100 UC • 35 AZN</option>
            </select>
            <input type="number" id="player-id" placeholder="PUBG ID">
            <button class="main-btn" onclick="processOrder()">TƏSDİQLƏ</button>
        </div>

        <div id="step3" class="step">
            <h2 style="color:var(--success);">SUCCESSFUL</h2>
            <canvas id="receiptCanvas" width="400" height="500"></canvas>
            <button class="main-btn" onclick="downloadReceipt()">QƏBZİ YÜKLƏ</button>
            <button class="main-btn" onclick="location.reload()" style="background:#222; margin-top:10px;">GERİ</button>
        </div>
    </div>

    <div id="chat-overlay">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="op-img" src="" class="op-img">
                <div>
                    <span id="op-name" style="font-weight:bold; color:var(--primary)">Operator</span>
                    <small style="color:var(--success); display:block;">● Sizinlədir</small>
                </div>
            </div>
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:2.5rem; cursor:pointer;">&times;</button>
        </div>
        <div class="chat-body" id="chat-body"></div>
        <div id="typing-ui" class="typing">Operator yazır...</div>
        <div style="padding:20px; display:flex; gap:12px; background:var(--card-bg)">
            <input type="text" id="chat-input" placeholder="Sualınızı yazın..." style="margin:0" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="background:var(--primary); border:none; padding:0 25px; border-radius:14px; font-weight:bold; color:black;">GÖNDƏR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOq7UqFo6Y9ldVXRthRP6U02TayFkv53I",
            authDomain: "neftgame-e4de3.firebaseapp.com",
            projectId: "neftgame-e4de3",
            storageBucket: "neftgame-e4de3.firebasestorage.app",
            messagingSenderId: "27529172910",
            appId: "1:27529172910:web:1a2a752e79295d47c39a3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let systemActive = true;
        let activeCode = "";

        // 5. GLOBAL SİSTEMİ İZLƏ
        function initSystem() {
            onSnapshot(doc(db, "settings", "global"), (doc) => {
                if(doc.exists()) {
                    systemActive = doc.data().active;
                    updateStatusUI();
                }
            });
            initOperator();
        }
        window.initSystem = initSystem;

        function updateStatusUI() {
            const el = document.getElementById('status-indicator');
            const txt = document.getElementById('status-text');
            const btn = document.getElementById('toggle-system-btn');

            if(systemActive) {
                el.className = "status-box online";
                txt.innerText = "SİSTEM AKTİVDİR";
                if(btn) { btn.innerText = "SİSTEMİ BAĞLA"; btn.style.background = "var(--error)"; }
            } else {
                el.className = "status-box offline";
                txt.innerText = "SİSTEM BAĞLIDIR";
                if(btn) { btn.innerText = "SİSTEMİ AÇ"; btn.style.background = "var(--success)"; }
            }
        }

        window.toggleGlobalSystem = async function() {
            await setDoc(doc(db, "settings", "global"), { active: !systemActive });
        }

        window.verifyCode = async function() {
            const code = document.getElementById('access-code').value.trim().toUpperCase();
            const err = document.getElementById('error-msg');

            if(code === "ADMIN2026") {
                document.getElementById('admin-panel').style.display = 'block';
                loadCodes();
                return;
            }

            // 4. SİSTEM BAĞLIYSA BLOKLA
            if(!systemActive) {
                err.innerText = "🔴 TƏƏSSÜF, SİSTEM HAZIRDA TEXNİKİ SƏBƏBDƏN BAĞLIDIR!";
                return;
            }

            if(!code) return;
            err.innerText = "Şifrələnmiş məlumatlar yoxlanılır...";
            
            try {
                const snap = await getDoc(doc(db, "codes", code));
                if(snap.exists() && !snap.data().used) {
                    activeCode = code;
                    runLoader(() => showStep('step2'), 5000); // 2. SANİYƏ ÇOXALDI
                } else {
                    err.innerText = snap.exists() ? "Bu kod artıq istifadə edilib!" : "Kod yanlışdır!";
                }
            } catch(e) { err.innerText = "Server xətası!"; }
        }

        window.addNewCode = async function() {
            const val = document.getElementById('new-code-input').value.trim().toUpperCase();
            if(!val) return;
            await setDoc(doc(db, "codes", val), { used: false, createdAt: new Date().toLocaleString() });
            loadCodes();
        }

        async function loadCodes() {
            const list = document.getElementById('codes-list');
            const snap = await getDocs(collection(db, "codes"));
            list.innerHTML = "";
            snap.forEach(d => {
                list.innerHTML += `<div style="font-size:10px; padding:5px; border-bottom:1px solid #222;">${d.id} - ${d.data().used ? 'İŞLƏNİB' : 'AKTİV'}</div>`;
            });
        }

        window.processOrder = async function() {
            const pid = document.getElementById('player-id').value;
            if(pid.length < 5) return;
            await updateDoc(doc(db, "codes", activeCode), { used: true, usedBy: pid });
            runLoader(() => { generateReceipt(pid); showStep('step3'); }, 4000);
        }
    </script>

    <script>
        // 1. GENİŞ AI OPERATOR BAZASI
        const responses = [
            { k: ["salam", "sa", "as"], r: "Vay, salam! 🖐️ Neft Game dünyasına xoş gəldin, brat! Sənə necə bomba kimi kömək edə bilərəm?" },
            { k: ["qiymet", "neceyedir", "uc"], r: "Bax, qiymətlərimiz rəqibsizdir: \n💎 660 UC - 5 AZN\n💎 1920 UC - 13 AZN\n💎 8100 UC - 35 AZN\nBütün yükləmələr rəsmidir! 🚀" },
            { k: ["kart", "odenis"], r: "💳 Ödəniş çox sadədir! Bu karta göndər: **4244 4848 4180 8581**. Göndərdikdən sonra qəbzi Adminə at, kodunu dərhal al! 🔥" },
            { k: ["guvenli", "ban", "risk"], r: "Dostum, bizdə hər şey rəsmidir (Midasbuy/Razer). Ban riski 0%-dir! 🛡️ Rahat ol, hesabın bizə əmanətdir." },
            { k: ["admin", "wp", "elaqe"], r: "📞 Admin həmişə onlayndır! WhatsApp: **+994 77 124 49 44**. Yaz dərhal cavab versin!" },
            { k: ["sagol", "tesekkur"], r: "Sən sağ ol, brat! 🤜🤛 Xoş oyunlar, bol-bol kill-lər arzulayıram! Başqa nə lazımdır?" }
        ];

        function sendMessage() {
            const inp = document.getElementById('chat-input');
            const txt = inp.value.trim().toLowerCase();
            if(!txt) return;

            addMsg(inp.value, 'user-msg');
            inp.value = "";
            document.getElementById('typing-ui').style.display = 'block';

            setTimeout(() => {
                document.getElementById('typing-ui').style.display = 'none';
                let res = "Brat, düzünü desəm bunu başa düşmədim... 🤔 Amma Adminə yazsan o dəqiqə həll edər! WP: +994 77 124 49 44";
                responses.forEach(i => { if(i.k.some(key => txt.includes(key))) res = i.r; });
                addMsg(res, 'bot-msg');
            }, 2500);
        }

        function handleChatToggle() {
            if(!window.systemActive) {
                alert("🔴 SİSTEM BAĞLIDIR - Dəstək xidməti hazırda işləmir!");
                return;
            }
            document.getElementById('chat-overlay').style.display = 'flex';
        }

        function addMsg(t, c) {
            const d = document.createElement('div'); d.className = `message ${c}`; d.innerText = t;
            const b = document.getElementById('chat-body'); b.appendChild(d); b.scrollTop = b.scrollHeight;
        }

        function initOperator() {
            const ops = [
                {n: "Aysel (Gaming Guru)", i: "https://img.icons8.com/3d-fluency/94/support-female.png"},
                {n: "Tural (Pro Admin)", i: "https://img.icons8.com/3d-fluency/94/support-male.png"}
            ];
            const o = ops[Math.floor(Math.random()*ops.length)];
            document.getElementById('op-img').src = o.i;
            document.getElementById('op-name').innerText = o.n;
        }

        function showStep(s) {
            document.querySelectorAll('.step').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
        }

        function runLoader(cb, time = 3000) {
            showStep('step-loader');
            let p = 0;
            const bar = document.getElementById('progress-fill');
            const iv = setInterval(() => {
                p += 2; bar.style.width = p + "%";
                if(p >= 100) { clearInterval(iv); setTimeout(cb, 500); }
            }, time / 50);
        }

        function generateReceipt(id) {
            const canvas = document.getElementById('receiptCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#0a0a0f"; ctx.fillRect(0,0,400,500);
            ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 5; ctx.strokeRect(10,10,380,480);
            ctx.fillStyle = "#00f2ff"; ctx.font = "bold 22px Orbitron";
            ctx.fillText("NEFT GAME RECEIPT", 70, 60);
            ctx.fillStyle = "#fff"; ctx.font = "14px Courier";
            ctx.fillText("----------------------------", 40, 100);
            ctx.fillText("PUBG ID: " + id, 40, 150);
            ctx.fillText("STATUS: ENCRYPTED & DELIVERED", 40, 200);
            ctx.fillText("DATE: " + new Date().toLocaleString(), 40, 250);
            ctx.fillStyle = "#00ff88"; ctx.fillText("SECURE TRANSACTION: 100%", 40, 350);
        }

        function downloadReceipt() {
            const a = document.createElement('a'); a.download = 'receipt.png';
            a.href = document.getElementById('receiptCanvas').toDataURL(); a.click();
        }
        function closeChat() { document.getElementById('chat-overlay').style.display='none'; }
    </script>
</body>
</html>
