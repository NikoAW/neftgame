<!DOCTYPE html>
<html lang="az" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neft Game - Pro System v3.0</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0a0c;
            --card-bg: #16161a;
            --text: #ffffff;
            --error: #ff4d4d;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .container { width: 95%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; border-radius: 10px; color: white; outline: none; }
        .main-btn { width: 100%; padding: 14px; border-radius: 10px; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; margin-top: 10px; }
        
        /* Admin Panel */
        #admin-panel { display: none; margin-top: 20px; padding: 15px; background: #000; border-radius: 12px; border: 1px solid var(--primary); max-height: 500px; overflow-y: auto; text-align: left; }
        .code-card { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 11px; border-left: 3px solid var(--primary); position: relative; }
        .delete-btn { position: absolute; right: 10px; top: 10px; color: var(--error); cursor: pointer; font-weight: bold; }
        .log-info { color: #888; margin-top: 4px; }

        .step { display: none; } .step.active { display: block; }
        .progress-bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); transition: 0.3s; }
        h2 { color: var(--primary); letter-spacing: 1px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="step1" class="step active">
            <h2>GİRİŞ PANELİ</h2>
            <input type="text" id="access-code" placeholder="Aktivasiya Kodunu Daxil Edin">
            <p id="error-msg" style="color:var(--error); font-size:0.8rem; min-height:20px;"></p>
            <button class="main-btn" onclick="verifyCode()">SİSTEMƏ GİR</button>

            <div id="admin-panel">
                <h3 style="color:var(--primary); margin-bottom:10px;">ADMİN İDARƏETMƏ</h3>
                
                <div style="border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px;">
                    <input type="text" id="new-code-input" placeholder="YENİ KOD YARAT">
                    <select id="expiry-select">
                        <option value="1">1 Saatlıq</option>
                        <option value="24">24 Saatlıq</option>
                        <option value="168">7 Günlük</option>
                        <option value="8760">Həmişəlik</option>
                    </select>
                    <button onclick="addNewCode()" style="width:100%; background:var(--success); border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">BAZAYA ƏLAVƏ ET</button>
                </div>

                <div id="codes-list">
                    <p style="text-align:center; font-size:12px;">Yüklənir...</p>
                </div>
            </div>
        </div>

        <div id="step-loader" class="step">
            <h2 id="loader-text">EMAL EDİLİR</h2>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>

        <div id="step2" class="step">
            <h2>PAKET SEÇİMİ</h2>
            <select id="packet-select">
                <option>660 UC (5 AZN)</option>
                <option>1920 UC (13 AZN)</option>
                <option>3120 UC (21 AZN)</option>
                <option>8100 UC (35 AZN)</option>
                <option>Royale Pass Plus (6 AZN)</option>
            </select>
            <input type="number" id="player-id" placeholder="Oyunçu ID">
            <button class="main-btn" onclick="processOrder()">TƏSDİQLƏ</button>
        </div>

        <div id="step3" class="step">
            <h2 style="color:var(--success);">UĞURLU!</h2>
            <p id="final-msg" style="font-size:0.9rem; line-height:1.5;"></p>
            <button class="main-btn" onclick="location.reload()" style="background:#333;">BAŞA QAYIT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOq7UqFo6Y9ldVXRthRP6U02TayFkv53I",
            authDomain: "neftgame-e4de3.firebaseapp.com",
            projectId: "neftgame-e4de3",
            storageBucket: "neftgame-e4de3.firebasestorage.app",
            messagingSenderId: "27529172910",
            appId: "1:27529172910:web:1a2a752e79295d47c39a3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentActiveCode = "";

        // 1. KOD YOXLAMA (GLOBAL)
        window.verifyCode = async function() {
            const code = document.getElementById('access-code').value.trim();
            const msg = document.getElementById('error-msg');

            if(code === "Admin2026") {
                document.getElementById('admin-panel').style.display = 'block';
                loadCodesList();
                return;
            }

            try {
                const docRef = doc(db, "codes", code.toUpperCase());
                const snap = await getDoc(docRef);

                if(snap.exists()) {
                    const data = snap.data();
                    const now = new Date().getTime();

                    if(data.used) {
                        msg.innerText = "Bu kod artıq " + data.usedBy + " ID-si tərəfindən işlənib!";
                    } else if (data.expiry && now > data.expiry) {
                        msg.innerText = "Bu kodun vaxtı bitib!";
                    } else {
                        currentActiveCode = code.toUpperCase();
                        runLoader(() => showStep('step2'));
                    }
                } else {
                    msg.innerText = "Kod tapılmadı!";
                }
            } catch(e) { msg.innerText = "Bağlantı xətası!"; }
        }

        // 2. YENİ KOD YARATMA (ADMİN)
        window.addNewCode = async function() {
            const code = document.getElementById('new-code-input').value.trim().toUpperCase();
            const hours = parseInt(document.getElementById('expiry-select').value);
            if(!code) return;

            const expiryTime = new Date().getTime() + (hours * 60 * 60 * 1000);

            try {
                await setDoc(doc(db, "codes", code), {
                    used: false,
                    expiry: expiryTime,
                    createdAt: new Date().toLocaleString(),
                    usedBy: null,
                    usedAt: null
                });
                alert("Kod uğurla əlavə edildi!");
                loadCodesList();
            } catch(e) { alert("Xəta!"); }
        }

        // 3. KODLARI SİYAHILAMA (ADMİN)
        async function loadCodesList() {
            const listDiv = document.getElementById('codes-list');
            listDiv.innerHTML = "Yüklenir...";
            
            const querySnapshot = await getDocs(collection(db, "codes"));
            listDiv.innerHTML = "";

            querySnapshot.forEach((docSnap) => {
                const d = docSnap.data();
                const isExpired = d.expiry && new Date().getTime() > d.expiry;
                
                const card = document.createElement('div');
                card.className = "code-card";
                card.style.borderColor = d.used ? "red" : (isExpired ? "orange" : "green");
                
                card.innerHTML = `
                    <span class="delete-btn" onclick="deleteCode('${docSnap.id}')">SİL</span>
                    <strong>${docSnap.id}</strong> <br>
                    <div class="log-info">
                        Status: ${d.used ? "İŞLƏNİB ✅" : (isExpired ? "VAXTI BİTİB ⏰" : "AKTİV 🟢")} <br>
                        Yaradıldı: ${d.createdAt} <br>
                        ${d.usedBy ? "İstifadəçi ID: " + d.usedBy : ""}
                        ${d.usedAt ? "<br>İstifadə Tarixi: " + d.usedAt : ""}
                    </div>
                `;
                listDiv.appendChild(card);
            });
        }

        // 4. KOD SİLMƏ (ADMİN)
        window.deleteCode = async function(id) {
            if(confirm(id + " kodunu silmək istəyirsiniz?")) {
                await deleteDoc(doc(db, "codes", id));
                loadCodesList();
            }
        }

        // 5. SİFARİŞİ TAMAMLAMAQ
        window.processOrder = async function() {
            const pID = document.getElementById('player-id').value;
            const packet = document.getElementById('packet-select').value;
            if(pID.length < 5) return alert("Düzgün ID yazın!");

            try {
                const docRef = doc(db, "codes", currentActiveCode);
                await updateDoc(docRef, {
                    used: true,
                    usedBy: pID,
                    usedAt: new Date().toLocaleString(),
                    packet: packet
                });
                
                document.getElementById('final-msg').innerText = `${packet} paketi ${pID} nömrəli hesaba göndərildi.`;
                runLoader(() => showStep('step3'));
            } catch(e) { alert("Xəta baş verdi!"); }
        }
    </script>

    <script>
        function showStep(s) {
            document.querySelectorAll('.step').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
        }

        function runLoader(cb) {
            showStep('step-loader');
            let p = 0;
            let iv = setInterval(() => {
                p += 20;
                document.getElementById('progress-fill').style.width = p + "%";
                if(p >= 100) { clearInterval(iv); cb(); }
            }, 200);
        }
    </script>
</body>
                </html>
