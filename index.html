<!DOCTYPE html>
<html lang="az" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neft Game - Ultimate System v5.0</title>
<style>
:root {
    --primary:#00f2ff; --secondary:#7000ff; --bg:#0a0a0c; --card-bg:#16161a;
    --text:#fff; --error:#ff4d4d; --success:#00ff88;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow-x:hidden;}
.container{width:95%;max-width:450px;background:var(--card-bg);padding:25px;border-radius:20px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
h2{color:var(--primary);text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;font-size:1.4rem;}
input,select{width:100%;padding:14px;margin:10px 0;background:#222;border:1px solid #333;border-radius:12px;color:white;outline:none;transition:0.3s;}
input:focus{border-color:var(--primary);}
.main-btn{width:100%;padding:16px;border-radius:12px;background:linear-gradient(45deg,var(--secondary),var(--primary));color:white;font-weight:bold;cursor:pointer;border:none;text-transform:uppercase;margin-top:10px;box-shadow:0 4px 15px rgba(112,0,255,0.3);}
#system-status{position:fixed;top:15px;left:15px;padding:10px 18px;border-radius:12px;font-weight:bold;font-size:0.85rem;box-shadow:0 0 15px rgba(0,255,255,0.5);}
.step{display:none;}.step.active{display:block;}
.progress-bar{height:10px;background:#222;border-radius:5px;overflow:hidden;margin:25px 0;}
.progress-fill{height:100%;width:0%;background:var(--primary);transition:0.4s;}
#receiptCanvas{width:100%;border-radius:10px;margin-top:15px;border:1px solid #333;background:#000;}
#admin-panel{display:none;margin-top:20px;padding:15px;background:#000;border-radius:15px;border:1px solid var(--primary);text-align:left;}
.code-card{background:#111;padding:12px;border-radius:10px;margin-bottom:10px;font-size:11px;border-left:4px solid var(--primary);position:relative;}
.delete-btn{position:absolute;right:10px;top:10px;color:var(--error);cursor:pointer;font-weight:bold;padding:5px;}
</style>
</head>
<body onload="initOperator()">

<div id="system-status">🟢 Sistem Aktif</div>

<div class="container">
    <div id="step1" class="step active">
        <h2>SİSTEMƏ GİRİŞ</h2>
        <input type="text" id="access-code" placeholder="Aktivasiya Kodunu Daxil Edin">
        <p id="error-msg" style="color:var(--error);font-size:0.8rem;min-height:20px;margin-top:5px;"></p>
        <button class="main-btn" onclick="verifyCode()">DAXİL OL</button>

        <div id="admin-panel">
            <h3 style="color:var(--primary);font-size:1rem;margin-bottom:15px;border-bottom:1px solid #333;padding-bottom:10px;">ADMİN PANEL</h3>
            <button onclick="toggleSystem()" style="margin-bottom:15px;">Global Sistem Aç/Kapat</button>
            <input type="text" id="new-code-input" placeholder="YENİ KOD">
            <button onclick="addNewCode()">KODU ƏLAVƏ ET</button>
            <div id="codes-list" style="max-height:300px;overflow-y:auto;margin-top:15px;"></div>
        </div>
    </div>

    <div id="step-loader" class="step">
        <h2 id="loader-title">YOXLANILIR...</h2>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <p id="loader-status" style="color:var(--primary);font-size:0.8rem;">Emal edilir...</p>
    </div>

    <div id="step2" class="step">
        <h2>SİFARİŞ MƏLUMATI</h2>
        <select id="packet-select">
            <option>660 UC</option><option>1920 UC</option><option>3120 UC</option><option>8100 UC</option>
        </select>
        <input type="number" id="player-id" placeholder="PUBG Mobile ID">
        <input type="text" id="phone-num" value="+994" placeholder="Əlaqə Nömrəsi">
        <button class="main-btn" onclick="processOrder()">SİFARİŞİ TƏSDİQLƏ</button>
    </div>

    <div id="step3" class="step">
        <h2 style="color:var(--success);">SİFARİŞ UĞURLUDUR!</h2>
        <canvas id="receiptCanvas" width="400" height="500"></canvas>
        <button class="main-btn" onclick="downloadReceipt()">QƏBZİ YÜKLƏ (.PNG)</button>
        <button class="main-btn" onclick="location.reload()" style="background:#333;margin-top:10px;">YENİ SİFARİŞ</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {apiKey:"<API_KEY>",authDomain:"<PROJECT>.firebaseapp.com",projectId:"<PROJECT>",storageBucket:"<PROJECT>.appspot.com",messagingSenderId:"<ID>",appId:"<APP_ID>"};
const app = initializeApp(firebaseConfig); const db = getFirestore(app);

let activeCode="", systemActive=true;

async function loadSystemStatus() {
    const sRef = doc(db,"global","status");
    const sSnap = await getDoc(sRef);
    if(sSnap.exists()){ systemActive = sSnap.data().active; updateSystemUI(); }
}

function updateSystemUI(){
    const el = document.getElementById('system-status');
    el.innerText = systemActive?"🟢 Sistem Aktif":"🔴 Sistem Bağlı";
}

window.toggleSystem = async function(){
    systemActive = !systemActive;
    updateSystemUI();
    await setDoc(doc(db,"global","status"),{active:systemActive});
}

window.verifyCode = async function(){
    if(!systemActive){
        alert("Sistem hal-hazırda bağlıdır!");
        return;
    }
    const code = document.getElementById('access-code').value.trim();
    if(code==="Admin2026"){ document.getElementById('admin-panel').style.display='block'; loadCodes(); return; }
    if(!code) return;
    document.getElementById('error-msg').innerText="Yoxlanılır...";
    const docRef = doc(db,"codes",code); const snap = await getDoc(docRef);
    if(snap.exists()){ const d = snap.data();
        if(d.used) document.getElementById('error-msg').innerText="Kod artıq istifadə olunub!";
        else{ activeCode = code; runLoader(()=>showStep('step2')); }
    } else { document.getElementById('error-msg').innerText="Kod tapılmadı!"; }
}

async function loadCodes(){
    const list = document.getElementById('codes-list');
    list.innerHTML="Yüklənir...";
    const snap = await getDocs(collection(db,"codes"));
    list.innerHTML="";
    snap.forEach(docSnap=>{
        const d = docSnap.data();
        const card = document.createElement('div'); card.className="code-card";
        card.style.borderColor=d.used?"red":"green";
        card.innerHTML=`<span class="delete-btn" onclick="deleteCode('${docSnap.id}')">SİL</span><strong>${docSnap.id}</strong><br>Status:${d.used?"İşlənib":"Aktiv"}<br>Yaradıldı:${d.createdAt}`;
        list.appendChild(card);
    });
}

window.addNewCode = async function(){
    const val = document.getElementById('new-code-input').value.trim();
    if(!val) return;
    await setDoc(doc(db,"codes",val),{used:false,createdAt:new Date().toLocaleString()});
    document.getElementById('new-code-input').value=""; loadCodes();
}

window.deleteCode = async function(id){
    if(confirm("Silinsin?")){ await deleteDoc(doc(db,"codes",id)); loadCodes(); }
}

function showStep(s){document.querySelectorAll('.step').forEach(x=>x.classList.remove('active'));document.getElementById(s).classList.add('active');}

function runLoader(cb){ showStep('step-loader'); let p=0; let iv=setInterval(()=>{p+=10; document.getElementById('progress-fill').style.width=p+"%"; if(p>=100){clearInterval(iv); cb();}},500); }

window.processOrder = async function(){
    const pid=document.getElementById('player-id').value;
    const phone=document.getElementById('phone-num').value;
    const pack=document.getElementById('packet-select').value;
    if(pid.length<5 || !phone.startsWith("+994")) return alert("ID və ya nömrə yanlışdır!");
    await updateDoc(doc(db,"codes",activeCode),{used:true,usedBy:pid,packet:pack,usedAt:new Date().toLocaleString(),phone:phone});
    runLoader(()=>{ generateReceipt(pid,pack,phone); showStep('step3'); });
}

function generateReceipt(id,pack,phone){
    const canvas=document.getElementById('receiptCanvas'); const ctx=canvas.getContext('2d');
    ctx.fillStyle="#111"; ctx.fillRect(0,0,400,500);
    ctx.strokeStyle="#00f2ff"; ctx.lineWidth=10; ctx.strokeRect(0,0,400,500);
    ctx.fillStyle="#00f2ff"; ctx.font="bold 24px Arial"; ctx.fillText("NEFT GAME SHOP",90,60);
    ctx.font="14px Arial"; ctx.fillText("RƏSMİ SİFARİŞ QƏBZİ",125,85);
    ctx.strokeStyle="#333"; ctx.setLineDash([5,5]); ctx.beginPath(); ctx.moveTo(40,110); ctx.lineTo(360,110); ctx.stroke();
    ctx.fillStyle="#fff"; ctx.font="16px Courier New"; ctx.fillText("TARİX: "+new Date().toLocaleString(),40,160);
    ctx.fillText("SİFARİŞ NO: #"+Math.floor(Math.random()*999999),40,200);
    ctx.fillText("OYUNÇU ID: "+id,40,240);
    ctx.fillText("ƏLAQƏ NÖMRƏSİ: "+phone,40,280);
    ctx.fillText("MƏHSUL: "+pack,40,320);
    ctx.fillText("STATUS: TƏSDİQLƏNDİ",40,360);
}

function downloadReceipt(){ const link=document.createElement('a'); link.download='qebz.png'; link.href=document.getElementById('receiptCanvas').toDataURL(); link.click(); }

const ops=[{n:"Leyla (Dəstək)",i:"https://img.icons8.com/3d-fluency/94/support-female.png"},{n:"Rəşad (Admin)",i:"https://img.icons8.com/3d-fluency/94/support-male.png"}];
function initOperator(){ const o=ops[Math.floor(Math.random()*ops.length)]; }
</script>

</body>
  </html>
