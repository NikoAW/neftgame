<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neft Game v7.5 - Stabil</title>
    <style>
        :root { --p: #00f2ff; --s: #7000ff; --bg: #0a0a0c; --card: #16161a; --txt: #fff; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--txt); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 420px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-p { background: linear-gradient(45deg, var(--s), var(--p)); color: #fff; }
        .btn-gold { background: var(--gold); color: #000; display: none; }
        
        /* STEPS */
        .step { display: none; } .step.active { display: block; }
        
        /* ADMIN */
        #admin-panel { display: none; text-align: left; background: #000; padding: 15px; border-radius: 15px; border: 1px solid var(--p); margin-top: 15px; }
        .code-item { background: #111; padding: 8px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; font-size: 12px; border-left: 3px solid var(--p); }
        
        /* WHEEL */
        #wheel { width: 250px; height: 250px; border-radius: 50%; border: 5px solid var(--gold); margin: 20px auto; transition: 4s cubic-bezier(0.1, 0, 0.1, 1); background: conic-gradient(var(--s) 0 90deg, var(--p) 90deg 180deg, var(--s) 180deg 270deg, var(--p) 270deg 360deg); position: relative; }
        
        /* NOTIF */
        #live-notif { position: fixed; bottom: 20px; left: -300px; background: var(--card); border: 1px solid var(--p); padding: 10px; border-radius: 10px; transition: 0.5s; z-index: 999; }
        #live-notif.show { left: 20px; }
    </style>
</head>
<body>

    <div id="live-notif">
        <small id="notif-txt" style="color:var(--p);">Yüklənir...</small>
    </div>

    <div class="container">
        <div id="step1" class="step active">
            <h2 style="color:var(--p); margin-bottom: 15px;">NEFT GAME</h2>
            <p style="font-size: 11px; margin-bottom: 10px;">Cihaz Sifarişləri: <span id="ord-count">0</span>/3</p>
            <input type="text" id="access-code" placeholder="Kodu daxil edin">
            <button class="btn btn-p" onclick="verifyCode()">Giriş</button>
            <button id="gift-btn" class="btn btn-gold" onclick="openWheel()">🎡 HƏDİYYƏ ÇARXI</button>

            <div id="admin-panel">
                <p style="color:var(--p); font-weight: bold; font-size: 12px; margin-bottom: 10px;">ADMİN PANEL</p>
                <div id="stats" style="font-size: 10px; margin-bottom: 10px; color: #aaa;"></div>
                <input type="text" id="new-code-val" placeholder="Yeni kod" style="padding:5px;">
                <button onclick="addNewCode()" style="width:100%; background:var(--p); border:none; padding:5px; border-radius:5px; margin-bottom:10px;">+ ƏLAVƏ ET</button>
                <div id="codes-list" style="max-height: 150px; overflow-y: auto;"></div>
            </div>
        </div>

        <div id="step2" class="step">
            <h3>SİFARİŞ VER</h3>
            <select id="pack">
                <option value="660 UC (5 AZN)">660 UC - 5 AZN</option>
                <option value="1920 UC (13 AZN)">1920 UC - 13 AZN</option>
                <option value="8100 UC (35 AZN)">8100 UC - 35 AZN</option>
            </select>
            <input type="number" id="pid" placeholder="Oyunçu ID">
            <button class="btn btn-p" onclick="sendOrder()">Təsdiqlə</button>
        </div>

        <div id="step-wheel" class="step">
            <h2 style="color:var(--gold);">BƏXTİNİ SINA</h2>
            <div id="wheel"></div>
            <button class="btn btn-gold" style="display:block;" id="spin-btn" onclick="spinNow()">Fırlat!</button>
        </div>

        <div id="step4" class="step">
            <canvas id="cvs" width="400" height="500" style="width:100%; border-radius: 10px;"></canvas>
            <button class="btn btn-p" onclick="downloadCvs()">Qəbzi Yüklə</button>
            <button class="btn" style="background:#444; color:#fff;" onclick="location.reload()">Geri</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, deleteDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOq7UqFo6Y9ldVXRthRP6U02TayFkv53I",
            authDomain: "neftgame-e4de3.firebaseapp.com",
            projectId: "neftgame-e4de3",
            storageBucket: "neftgame-e4de3.firebasestorage.app",
            appId: "1:27529172910:web:1a2a752e79295d47c39a3f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let activeCode = "";

        // Cihaz takibi
        let count = localStorage.getItem('order_count') || 0;
        document.getElementById('ord-count').innerText = count;
        if(count >= 3 && !localStorage.getItem('wheel_done')) {
            document.getElementById('gift-btn').style.display = 'block';
        }

        window.verifyCode = async function() {
            const val = document.getElementById('access-code').value.trim().toUpperCase();
            if(val === "ADMIN2026") {
                document.getElementById('admin-panel').style.display = 'block';
                loadAdminData();
                return;
            }
            const snap = await getDoc(doc(db, "codes", val));
            if(snap.exists() && !snap.data().used) {
                activeCode = val;
                showStep('step2');
            } else { alert("Kod yanlışdır!"); }
        }

        window.sendOrder = async function() {
            const id = document.getElementById('pid').value;
            const p = document.getElementById('pack').value;
            if(!id) return;
            const rid = "NFT-" + Math.floor(Math.random()*999999);
            const data = { used: true, usedBy: id, packet: p, usedAt: new Date().getTime(), receiptID: rid };
            
            await updateDoc(doc(db, "codes", activeCode), data);
            await setDoc(doc(db, "receipts", rid), data);
            
            let newCount = parseInt(count) + 1;
            localStorage.setItem('order_count', newCount);
            
            drawReceipt(id, p, rid, false);
            showStep('step4');
        }

        // ÇARX MƏNTİQİ
        window.openWheel = () => showStep('step-wheel');
        window.spinNow = function() {
            const prizes = ["3120 UC Hədiyyə", "8100 UC Hədiyyə", "20 AZN Hədiyyə", "Royale Pass Plus"];
            const r = Math.floor(Math.random()*4);
            document.getElementById('wheel').style.transform = `rotate(${2000 + (r*90)}deg)`;
            document.getElementById('spin-btn').disabled = true;
            
            setTimeout(() => {
                localStorage.setItem('wheel_done', 'true');
                drawReceipt("QALİB", prizes[r], "WIN-"+Math.floor(Math.random()*999), true);
                showStep('step4');
            }, 4100);
        }

        // ADMİN FUNKSİYALARI (TAM BƏRPA)
        async function loadAdminData() {
            const snap = await getDocs(collection(db, "codes"));
            const list = document.getElementById('codes-list');
            list.innerHTML = "";
            let totalAZN = 0;
            snap.forEach(d => {
                const data = d.data();
                if(data.used) totalAZN += 5; // Sadə hesablama
                list.innerHTML += `<div class="code-item"><span>${d.id} [${data.used?'X':'OK'}]</span> <b onclick="delCode('${d.id}')" style="color:red">X</b></div>`;
            });
            document.getElementById('stats').innerText = "Təxmini qazanc: " + totalAZN + " AZN";
        }

        window.addNewCode = async function() {
            const v = document.getElementById('new-code-val').value.toUpperCase();
            if(v) { await setDoc(doc(db, "codes", v), { used: false }); loadAdminData(); }
        }

        window.delCode = async function(id) {
            if(confirm("Silinsin?")) { await deleteDoc(doc(db, "codes", id)); loadAdminData(); }
        }

        // CANLI BİLDİRİŞ (v6.1-dən gələn stabil versiya)
        const q = query(collection(db, "receipts"), orderBy("usedAt", "desc"), limit(1));
        onSnapshot(q, (s) => {
            s.forEach(d => {
                document.getElementById('notif-txt').innerText = d.data().usedBy.substr(0,4) + "*** " + d.data().packet + " aldı!";
                document.getElementById('live-notif').classList.add('show');
                setTimeout(() => document.getElementById('live-notif').classList.remove('show'), 5000);
            });
        });

        // UI
        function showStep(s) { document.querySelectorAll('.step').forEach(x => x.classList.remove('active')); document.getElementById(s).classList.add('active'); }
        
        function drawReceipt(id, p, rid, gift) {
            const c = document.getElementById('cvs'); const x = c.getContext('2d');
            x.fillStyle = "#111"; x.fillRect(0,0,400,500);
            x.strokeStyle = gift ? "#ffd700" : "#00f2ff"; x.lineWidth = 10; x.strokeRect(0,0,400,500);
            x.fillStyle = gift ? "#ffd700" : "#00f2ff"; x.font = "bold 20px Arial";
            x.fillText(gift ? "HƏDİYYƏ QƏBZİ" : "SİFARİŞ QƏBZİ", 110, 50);
            x.fillStyle = "#fff"; x.font = "16px Arial";
            x.fillText("ID: " + id, 50, 150);
            x.fillText("Paket: " + p, 50, 200);
            x.fillText("Kod: " + rid, 50, 250);
            x.fillText("Tarix: " + new Date().toLocaleDateString(), 50, 300);
        }
        window.downloadCvs = () => { const a = document.createElement('a'); a.download = 'qebz.png'; a.href = document.getElementById('cvs').toDataURL(); a.click(); }
    </script>
</body>
</html>
