<!DOCTYPE html>
<html lang="az" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neft Game - Legendary v6.8</title>
    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #0a0a0c;
            --card-bg: #16161a; --text: #ffffff; --error: #ff4d4d;
            --success: #00ff88; --chat-bot: #25252b; --chat-user: #7000ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* FULL LOADING OVERLAY */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 70px; height: 70px; border: 5px solid #111; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 20px var(--primary); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-text { margin-top: 20px; font-weight: bold; letter-spacing: 2px; color: var(--primary); }

        /* BANNER LENTI */
        #announcement-bar { position: fixed; top: 0; width: 100%; background: linear-gradient(90deg, #7000ff, #00f2ff); color: #000; font-weight: bold; padding: 8px 0; font-size: 13px; z-index: 900; display: none; overflow: hidden; }
        .marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; padding-left: 100%; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-200%); } }

        /* MENU ICON */
        .menu-trigger { position: fixed; top: 45px; right: 20px; z-index: 1100; cursor: pointer; transition: 0.5s; }
        .menu-trigger.open { transform: rotate(180deg); }
        .menu-trigger img { width: 45px; height: 45px; }

        /* SIDE MENU */
        #side-menu { position: fixed; top: 0; right: -80%; width: 80%; height: 100%; background: rgba(10, 10, 12, 0.98); border-left: 2px solid var(--primary); z-index: 1050; transition: 0.5s; padding-top: 100px; }
        #side-menu.active { right: 0; }
        .menu-item { padding: 20px 25px; border-bottom: 1px solid #222; font-weight: bold; display: flex; align-items: center; gap: 15px; cursor: pointer; }

        .container { width: 92%; max-width: 420px; background: var(--card-bg); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); text-align: center; position: relative; z-index: 10; }
        h2 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1e; border: 1px solid #333; border-radius: 12px; color: white; outline: none; }
        .main-btn { width: 100%; padding: 18px; border-radius: 12px; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }

        /* CHATBOT */
        .full-screen-section { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; flex-direction: column; }
        .section-header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        /* ADMIN PANEL */
        #admin-panel { display: none; margin-top: 25px; padding: 15px; background: #000; border: 2px solid var(--primary); border-radius: 15px; text-align: left; }
        .code-info-card { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--primary); font-size: 11px; line-height: 1.6; }

        .step { display: none; } .step.active { display: block; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">SİSTEMƏ GİRİŞ EDİLİR...</div>
    </div>

    <div id="announcement-bar"><div class="marquee" id="ann-text">YÜKLƏNİR...</div></div>

    <div class="menu-trigger" id="m-icon" onclick="toggleMenu()">
        <img src="https://img.icons8.com/3d-fluency/94/menu.png" alt="menu"/>
    </div>

    <div id="side-menu">
        <div class="menu-item" onclick="openSection('sec-chat')"><img width="30" src="https://img.icons8.com/fluency/48/chatbot.png"> KÖMƏK (BOT)</div>
        <div class="menu-item" onclick="openSection('sec-faq')"><img width="30" src="https://img.icons8.com/fluency/48/help.png"> SUALLAR</div>
        <div class="menu-item" onclick="window.open('https://wa.me/994771244944')"><img width="30" src="https://img.icons8.com/color/48/whatsapp.png"> WHATSAPP</div>
    </div>

    <div id="sec-chat" class="full-screen-section">
        <div class="section-header">
            <span style="color:var(--primary); font-weight:bold;">🤖 NEFT BOT 2.0</span>
            <button onclick="closeSection('sec-chat')" style="background:none; border:none; color:white; font-size:2.5rem;">&times;</button>
        </div>
        <div id="chat-body" style="flex-grow:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;">
            <div class="message bot-msg" style="background:var(--chat-bot); padding:12px; border-radius:15px; align-self:flex-start;">Salam! Mən Neft Game-in rəsmi köməkçisiyəm. Nə kömək edə bilərəm?</div>
        </div>
        <div style="padding:15px; background:#111; display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="Sualınızı yazın..." style="margin:0; border-radius:30px;">
            <button onclick="sendMessage()" style="background:var(--primary); border:none; width:55px; height:55px; border-radius:50%; color:black; font-weight:bold;">></button>
        </div>
    </div>

    <div class="container">
        <div id="step1" class="step active">
            <h2>SİSTEMƏ GİRİŞ</h2>
            <input type="text" id="access-code" placeholder="Aktivasiya Kodunu Daxil Edin">
            <button class="main-btn" onclick="verifyCode()">DAXİL OL</button>

            <div id="admin-panel">
                <h4 style="color:var(--primary); margin-bottom:10px;">📊 ADMİN STRATEJİ</h4>
                <div id="codes-list" style="max-height:300px; overflow-y:auto; margin-bottom:10px;"></div>
                <button onclick="addNewCodeUI()" style="width:100%; background:var(--success); border:none; padding:12px; font-weight:bold; border-radius:10px;">+ YENİ KOD ƏLAVƏ ET</button>
                <input type="text" id="admin-ann-input" placeholder="Banner mətni..." style="margin-top:15px;">
                <button onclick="updateAnn()" style="width:100%; background:var(--secondary); border:none; padding:10px; color:white; border-radius:8px;">BANNERİ YENİLƏ</button>
            </div>
        </div>

        <div id="step2" class="step">
            <h2>PAKET SEÇİN</h2>
            <select id="packet-select">
                <option value="660 UC">660 UC • 5 AZN</option>
                <option value="1920 UC">1920 UC • 13 AZN</option>
                <option value="8100 UC">8100 UC • 35 AZN</option>
            </select>
            <input type="number" id="player-id" placeholder="PUBG Mobile ID">
            <button class="main-btn" onclick="processOrder()">SİFARİŞİ TAMAMLA</button>
        </div>

        <div id="step3" class="step">
            <h2 style="color:var(--success);">UĞURLU!</h2>
            <canvas id="receiptCanvas" width="400" height="550" style="width:100%; border-radius:15px;"></canvas>
            <button class="main-btn" onclick="downloadReceipt()">QƏBZİ YÜKLƏ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCOq7UqFo6Y9ldVXRthRP6U02TayFkv53I", authDomain: "neftgame-e4de3.firebaseapp.com", projectId: "neftgame-e4de3", storageBucket: "neftgame-e4de3.firebasestorage.app", appId: "1:27529172910:web:1a2a752e79295d47c39a3f" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let activeCode = "";

        // 🟢 UNIVERSAL LOADING SYSTEM (8.5 Seconds)
        async function startLoading(text, callback) {
            const overlay = document.getElementById('loading-overlay');
            const lText = document.getElementById('loading-text');
            overlay.style.display = 'flex';
            
            const messages = ["Məlumatlar yoxlanılır...", "Təhlükəsizlik keçidi yaradılır...", "Serverlə əlaqə qurulur...", "Sistem təsdiqi gözlənilir..."];
            let i = 0;
            const iv = setInterval(() => {
                lText.innerText = messages[i % messages.length];
                i++;
            }, 2000);

            setTimeout(() => {
                clearInterval(iv);
                overlay.style.display = 'none';
                callback();
            }, 8500);
        }

        // 🟢 MENU TOGGLE
        window.toggleMenu = () => {
            const menu = document.getElementById('side-menu');
            const icon = document.getElementById('m-icon');
            menu.classList.toggle('active');
            icon.classList.toggle('open');
        };

        // 🟢 AUTH & ADMIN
        window.verifyCode = async function() {
            const code = document.getElementById('access-code').value.trim().toUpperCase();
            if(code === "ADMIN2026") { document.getElementById('admin-panel').style.display = 'block'; loadCodes(); return; }
            const snap = await getDoc(doc(db, "codes", code));
            if(snap.exists() && !snap.data().used) {
                activeCode = code;
                startLoading("GİRİŞ EDİLİR...", () => showStep('step2'));
            } else { alert("Kod yanlışdır və ya işlənib!"); }
        };

        window.processOrder = async function() {
            const pid = document.getElementById('player-id').value;
            const pack = document.getElementById('packet-select').value;
            if(pid.length < 5) return alert("ID yazın!");
            
            startLoading("SİFARİŞ İŞLƏNİR...", async () => {
                const rid = "NFT-" + Math.floor(Math.random()*999999);
                const data = { used: true, usedBy: pid, packet: pack, usedAt: new Date().getTime(), receiptID: rid };
                await updateDoc(doc(db, "codes", activeCode), data);
                await setDoc(doc(db, "receipts", rid), data);
                generateReceipt(pid, pack, rid);
                showStep('step3');
            });
        };

        window.loadCodes = async function() {
            const snap = await getDocs(collection(db, "codes"));
            const list = document.getElementById('codes-list'); list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const status = data.used ? `<br><span style="color:var(--primary)">👤 ID: ${data.usedBy} | 📦 ${data.packet}</span>` : '<span style="color:var(--success)"> (AKTİV)</span>';
                list.innerHTML += `
                    <div class="code-info-card">
                        <b>${d.id}</b> ${status}
                        <div style="text-align:right; margin-top:5px;"><button onclick="deleteCode('${d.id}')" style="background:red; color:white; border:none; padding:3px 8px; border-radius:4px; font-size:9px;">SİL</button></div>
                    </div>`;
            });
        };

        // 🟢 NEFTBOT 2.0 LOGIC
        window.sendMessage = () => {
            const inp = document.getElementById('chat-input');
            const val = inp.value.toLowerCase().trim();
            const body = document.getElementById('chat-body');
            if(!val) return;

            body.innerHTML += `<div class="message user-msg" style="align-self:flex-end; background:var(--chat-user); padding:10px; border-radius:15px;">${inp.value}</div>`;
            
            let r = "Məlumat üçün operatora müraciət edin: +994 77 124 49 44";
            if(val.includes("salam")) r = "Salam! Neft Game-in rəsmi dəstək botuyam. Sizə necə kömək edə bilərəm? 🤝";
            else if(val.includes("kimsən")) r = "Mən Neft Game üçün hazırlanmış süni intellektli köməkçiyəm. Sifarişlərinizə baxmaqda və suallarınızı cavablamaqda kömək edirəm. 🤖";
            else if(val.includes("problem") || val.includes("xəta")) r = "Əgər hər hansı bir texniki xəta baş veribsə, zəhmət olmasa ID-nizi və ödəniş qəbzini WhatsApp-a göndərin. Hər şeyi həll edəcəyik! 🛠️";
            else if(val.includes("qiymet")) r = "💎 UC qiymətlərimiz bazarda ən ucuzudur: 660 UC (5 AZN), 1920 UC (13 AZN), 8100 UC (35 AZN). 🔥";
            else if(val.includes("kart")) r = "💳 Ödəniş üçün kart nömrəmiz: <b>4244 4848 4180 8581</b>. Sifarişi tamamlamazdan əvvəl ödəniş etməyiniz mütləqdir.";
            else if(val.includes("sağol") || val.includes("təşəkkür")) r = "Xoşdur! Sizin razı qalmağınız bizim üçün önəmlidir. Uğurlu oyunlar! 🎮";

            setTimeout(() => {
                body.innerHTML += `<div class="message bot-msg" style="background:var(--chat-bot); padding:10px; border-radius:15px; align-self:flex-start;">${r}</div>`;
                body.scrollTop = body.scrollHeight;
            }, 600);
            inp.value = "";
        };

        // UI HELPERS
        function showStep(s) { document.querySelectorAll('.step').forEach(x => x.classList.remove('active')); document.getElementById(s).classList.add('active'); }
        window.openSection = (id) => { toggleMenu(); document.getElementById(id).style.display = 'flex'; };
        window.closeSection = (id) => document.getElementById(id).style.display = 'none';
        window.addNewCodeUI = async function() { const v = prompt("Kod:"); if(v){ await setDoc(doc(db, "codes", v.toUpperCase()), {used:false}); loadCodes(); } };
        window.deleteCode = async function(id) { if(confirm("Silinsin?")){ await deleteDoc(doc(db, "codes", id)); loadCodes(); } };
        window.updateAnn = async function() { const t = document.getElementById('admin-ann-input').value; if(t) await setDoc(doc(db, "settings", "announcement"), {text:t}); alert("Yeniləndi!"); };
        onSnapshot(doc(db, "settings", "announcement"), s => { if(s.exists()){ document.getElementById('announcement-bar').style.display='block'; document.getElementById('ann-text').innerText=s.data().text; } });

        function generateReceipt(id, p, rid) {
            const c = document.getElementById('receiptCanvas'); const ctx = c.getContext('2d');
            ctx.fillStyle = "#0f0f12"; ctx.fillRect(0,0,400,550);
            ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 10; ctx.strokeRect(0,0,400,550);
            ctx.fillStyle = "#00f2ff"; ctx.font = "bold 26px Arial"; ctx.fillText("NEFT GAME SHOP", 85, 60);
            ctx.fillStyle = "#fff"; ctx.font = "16px Arial";
            ctx.fillText("İstifadəçi ID: " + id, 50, 150);
            ctx.fillText("Məhsul: " + p, 50, 200);
            ctx.fillText("Sifariş No: " + rid, 50, 250);
            ctx.fillText("Tarix: " + new Date().toLocaleString(), 50, 300);
            ctx.fillStyle = "#00ff88"; ctx.font = "bold 20px Arial"; ctx.fillText("ÖDƏNİŞ TƏSDİQLƏNDİ", 100, 480);
        }
        window.downloadReceipt = () => { const a = document.createElement('a'); a.download='neft_qebz.png'; a.href=document.getElementById('receiptCanvas').toDataURL(); a.click(); };
    </script>
</body>
</html>
