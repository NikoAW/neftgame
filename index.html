<!DOCTYPE html>
<html lang="az" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neft Game - Ultimate System v4.0</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0a0c;
            --card-bg: #16161a;
            --text: #ffffff;
            --error: #ff4d4d;
            --success: #00ff88;
            --chat-bot: #25252b;
            --chat-user: #7000ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .container { width: 95%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        h2 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-size: 1.4rem; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #333; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .main-btn { width: 100%; padding: 16px; border-radius: 12px; background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; margin-top: 10px; box-shadow: 0 4px 15px rgba(112, 0, 255, 0.3); }
        
        /* ADMIN PANEL STYLE */
        #admin-panel { display: none; margin-top: 20px; padding: 15px; background: #000; border-radius: 15px; border: 2px solid var(--primary); text-align: left; }
        .admin-header { color: var(--primary); font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .code-card { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 12px; border-left: 4px solid var(--primary); position: relative; }
        .code-card.used { border-left-color: var(--error); }
        .delete-btn { position: absolute; right: 10px; top: 10px; color: var(--error); cursor: pointer; font-weight: bold; background: rgba(255,0,0,0.1); padding: 4px 8px; border-radius: 5px; }

        /* Diğer UI elementleri */
        #chat-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999; flex-direction: column; }
        .chat-header { padding: 15px 20px; background: var(--card-bg); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; }
        .bot-msg { background: var(--chat-bot); align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
        .user-msg { background: var(--chat-user); align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .step { display: none; } .step.active { display: block; }
        .progress-bar { height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin: 25px 0; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); transition: 0.4s; }
        #receiptCanvas { width: 100%; border-radius: 10px; margin-top: 15px; border: 1px solid #333; background: #000; }
    </style>
</head>
<body>

    <div class="container">
        <div id="step1" class="step active">
            <div onclick="openChat()" style="cursor:pointer; display: inline-block; margin-bottom: 20px;">
                <img width="48" height="48" src="https://img.icons8.com/fluency/48/chatbot--v1.png" alt="chatbot--v1"/>
                <p style="color:var(--primary); font-size: 0.7rem; font-weight: bold;">BOT DƏSTƏK</p>
            </div>
            <h2>SİSTEMƏ GİRİŞ</h2>
            <input type="text" id="access-code" placeholder="Aktivasiya Kodunu Daxil Edin">
            <p id="error-msg" style="color:var(--error); font-size:0.8rem; min-height:20px; margin-top:5px;"></p>
            <button class="main-btn" onclick="verifyCode()">DAXİL OL</button>

            <div id="admin-panel">
                <div class="admin-header">
                    <span>ADMİN STRATEJİ</span>
                    <span onclick="location.reload()" style="cursor:pointer; font-size:0.8rem;">[X]</span>
                </div>
                <input type="text" id="new-code-input" placeholder="YENİ KOD YARAT (Məs: NEFT-77)">
                <button onclick="addNewCode()" style="width:100%; background:var(--success); color:black; padding:10px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">KODU AKTİVLƏŞDİR</button>
                
                <h4 style="margin: 15px 0 10px; font-size: 0.8rem; color: #888;">MÖVCUD KODLAR VƏ STATUSLAR:</h4>
                <div id="codes-list" style="max-height: 250px; overflow-y: auto;">
                    </div>
            </div>
        </div>

        <div id="step-loader" class="step">
            <h2 id="loader-title">Yoxlanılır...</h2>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>

        <div id="step2" class="step">
            <h2>SİFARİŞ MƏLUMATI</h2>
            <select id="packet-select">
                <option value="660 UC (5 AZN)">660 UC • 5 AZN</option>
                <option value="1920 UC (13 AZN)">1920 UC • 13 AZN</option>
                <option value="8100 UC (35 AZN)">8100 UC • 35 AZN</option>
            </select>
            <input type="number" id="player-id" placeholder="PUBG Mobile ID">
            <button class="main-btn" onclick="processOrder()">TƏSDİQLƏ</button>
        </div>

        <div id="step3" class="step">
            <h2 style="color:var(--success);">UĞURLUDUR!</h2>
            <canvas id="receiptCanvas" width="400" height="500"></canvas>
            <button class="main-btn" onclick="downloadReceipt()">PNG OLARAQ YÜKLƏ</button>
            <button class="main-btn" onclick="location.reload()" style="background:#333;">GERİ</button>
        </div>
    </div>

    <div id="chat-overlay">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://img.icons8.com/fluency/48/chatbot--v1.png" width="40">
                <span style="font-weight:bold; color:var(--primary);">NEFT BOT</span>
            </div>
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:2rem;">&times;</button>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="message bot-msg">Salam! Mən Neft Game botuyam. Sualınız var?</div>
        </div>
        <div style="padding:20px; display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="Yazın..." style="margin:0">
            <button onclick="sendMessage()" style="background:var(--primary); border:none; padding:0 15px; border-radius:10px;">></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOq7UqFo6Y9ldVXRthRP6U02TayFkv53I",
            authDomain: "neftgame-e4de3.firebaseapp.com",
            projectId: "neftgame-e4de3",
            storageBucket: "neftgame-e4de3.firebasestorage.app",
            messagingSenderId: "27529172910",
            appId: "1:27529172910:web:1a2a752e79295d47c39a3f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let activeCode = "";

        // KODU YOXLAMAQ
        window.verifyCode = async function() {
            const code = document.getElementById('access-code').value.trim().toUpperCase();
            if(code === "ADMIN2026") { 
                document.getElementById('admin-panel').style.display = 'block'; 
                loadCodes(); 
                return; 
            }
            if(!code) return;
            
            const err = document.getElementById('error-msg');
            err.innerText = "Yoxlanılır...";
            
            try {
                const docRef = doc(db, "codes", code);
                const snap = await getDoc(docRef);
                if(snap.exists()) {
                    if(snap.data().used) {
                        err.innerText = "Bu kod artıq işlənib!";
                    } else {
                        activeCode = code;
                        runLoader(() => showStep('step2'));
                    }
                } else {
                    err.innerText = "Kod yanlışdır!";
                }
            } catch(e) { err.innerText = "Xəta baş verdi!"; }
        }

        // ADMİN: KODLARI YÜKLƏMƏK
        async function loadCodes() {
            const list = document.getElementById('codes-list');
            list.innerHTML = "Yüklenir...";
            const snap = await getDocs(collection(db, "codes"));
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const div = document.createElement('div');
                div.className = `code-card ${data.used ? 'used' : ''}`;
                div.innerHTML = `
                    <span class="delete-btn" onclick="deleteCode('${d.id}')">SİL</span>
                    <strong>KOD: ${d.id}</strong><br>
                    Status: ${data.used ? '❌ İşlənib (ID: '+data.usedBy+')' : '✅ Aktiv'}
                `;
                list.appendChild(div);
            });
        }

        // ADMİN: YENİ KOD ƏLAVƏ ETMƏK
        window.addNewCode = async function() {
            const val = document.getElementById('new-code-input').value.trim().toUpperCase();
            if(!val) return;
            await setDoc(doc(db, "codes", val), { used: false, usedBy: null, createdAt: new Date().getTime() });
            document.getElementById('new-code-input').value = "";
            loadCodes();
        }

        // ADMİN: KODU SİLMƏK
        window.deleteCode = async function(id) {
            if(confirm(id + " silinsin?")) {
                await deleteDoc(doc(db, "codes", id));
                loadCodes();
            }
        }

        // SİFARİŞİ TAMAMLAMAQ
        window.processOrder = async function() {
            const pid = document.getElementById('player-id').value;
            const pack = document.getElementById('packet-select').value;
            if(pid.length < 5) return alert("ID-ni düzgün yazın!");
            
            await updateDoc(doc(db, "codes", activeCode), { 
                used: true, 
                usedBy: pid, 
                packet: pack,
                usedAt: new Date().toLocaleString() 
            });
            
            runLoader(() => { generateReceipt(pid, pack); showStep('step3'); });
        }
    </script>

    <script>
        // UI FUNKSİYALARI
        function showStep(s) { document.querySelectorAll('.step').forEach(x => x.classList.remove('active')); document.getElementById(s).classList.add('active'); }
        function runLoader(cb) { showStep('step-loader'); let p = 0; let iv = setInterval(() => { p += 20; document.getElementById('progress-fill').style.width = p + "%"; if(p >= 100) { clearInterval(iv); cb(); } }, 300); }
        function openChat() { document.getElementById('chat-overlay').style.display='flex'; }
        function closeChat() { document.getElementById('chat-overlay').style.display='none'; }

        function generateReceipt(id, pack) {
            const canvas = document.getElementById('receiptCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#0f0f12"; ctx.fillRect(0,0,400,500);
            ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 10; ctx.strokeRect(0,0,400,500);
            ctx.fillStyle = "#00f2ff"; ctx.font = "bold 26px Arial"; ctx.fillText("NEFT GAME SHOP", 85, 60);
            ctx.fillStyle = "#fff"; ctx.font = "18px Courier New";
            ctx.fillText("--------------------------", 40, 120);
            ctx.fillText("OYUNÇU ID: " + id, 40, 180);
            ctx.fillText("MƏHSUL: " + pack, 40, 220);
            ctx.fillText("TARİX: " + new Date().toLocaleDateString(), 40, 260);
            ctx.fillText("--------------------------", 40, 320);
            ctx.fillStyle = "#00ff88"; ctx.font = "bold 22px Arial";
            ctx.fillText("ÖDƏNİŞ TƏSDİQLƏNDİ", 90, 420);
        }

        function downloadReceipt() { const link = document.createElement('a'); link.download = 'neft_game_qebz.png'; link.href = document.getElementById('receiptCanvas').toDataURL(); link.click(); }
        
        function sendMessage() {
            const inp = document.getElementById('chat-input');
            if(!inp.value) return;
            const b = document.getElementById('chat-body');
            b.innerHTML += `<div class="message user-msg">${inp.value}</div>`;
            setTimeout(() => { b.innerHTML += `<div class="message bot-msg">Sifarişiniz və ya kodunuzla bağlı problem varsa, zəhmət olmasa WhatsApp adminlə əlaqə saxlayın: +994 77 124 49 44</div>`; b.scrollTop = b.scrollHeight; }, 1000);
            inp.value = "";
        }
    </script>
</body>
</html>
